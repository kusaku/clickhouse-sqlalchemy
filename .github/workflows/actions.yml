on: [pull_request]
name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64
      - name: Install lint requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flake8 flake8-print
      - name: Run flake8
        run: flake8

  tests:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    services:
      clickhouse-server:
        image: clickhouse/clickhouse-server:26.2.4.23
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: secret
        ports:
          - 8123:8123
          - 9000:9000

    name: py${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install test requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python testsrequire.py
          python setup.py develop
      - name: Run tests
        if: matrix.python-version != '3.14'
        run: pytest --timeout=10 -v -x
        timeout-minutes: 2
      - name: Install coverage tools
        if: matrix.python-version == '3.14'
        run: |
          python -m pip install coverage
          # Newer coveralls do not work with github actions.
          python -m pip install 'coveralls<3.0.0'
      - name: Run tests with coverage
        if: matrix.python-version == '3.14'
        run: coverage run --source=clickhouse_sqlalchemy -m pytest --timeout=10 -v -x
        timeout-minutes: 2
      - name: Upload coverage
        if: matrix.python-version == '3.14'
        run: coveralls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
