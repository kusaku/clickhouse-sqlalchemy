name: Internal PyPI Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next internal tag
        id: tag_version
        shell: bash
        run: |
          latest_tag="$(
            git tag --sort=-v:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(\.post[0-9]+)?$' \
            | head -n 1
          )"

          if [ -z "$latest_tag" ]; then
            echo "No compatible version tag found"
            exit 1
          fi

          if [[ "$latest_tag" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.post([0-9]+)$ ]]; then
            base_version="${BASH_REMATCH[1]}"
            post_number="${BASH_REMATCH[2]}"
            new_tag="${base_version}.post$((post_number + 1))"
          elif [[ "$latest_tag" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            new_tag="${latest_tag}.post1"
          else
            echo "Unsupported tag format: $latest_tag"
            exit 1
          fi

          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag_version.outputs.new_tag }}"
          git push origin "${{ steps.tag_version.outputs.new_tag }}"

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          makeLatest: true
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}

  build:
    uses: adjust/githubWorkflows/.github/workflows/automateBuildPushWheel.yml@v8.1.15
    needs: [release]
    with:
      python_version: 3.12
