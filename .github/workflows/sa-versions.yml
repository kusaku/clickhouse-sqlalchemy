on: [pull_request]
name: "SQLAlchemy >=2.0.0 versions"

jobs:
  tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
        clickhouse-version:
          - 26.2.4.23
        sa-version:
          - "2.0.0"
          - "2.0.11"
          - "2.0.18"
          - "2.0.19"
          - "2.0.23"
          - "2.0.24"
          - "2.0.25"
          - "2.0.37"
          - "2.0.41"
          - "2.0.44"
          - "2.0.46"
    services:
      clickhouse-server:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse-version }}
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: secret
        ports:
          - 8123:8123
          - 9000:9000

    name: ${{ matrix.python-version }} SA=${{ matrix.sa-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install test requirements
        run: |
          pip install --upgrade pip setuptools wheel
          python testsrequire.py
          python setup.py develop
          # Limit each test time execution.
          pip install pytest-timeout
      - name: Install SQLAlchemy
        run: pip install sqlalchemy==${{ matrix.sa-version }}
      - name: Run tests
        run: pytest --timeout=10 -v -x
        timeout-minutes: 2
